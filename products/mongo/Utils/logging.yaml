---
version: 1
disable_existing_loggers: False
formatters:
    simple:
        format: "%(asctime)s.%(msecs)03d %(name)s %(relativeCreated)d %(levelname)s %(module)s %(funcName)s %(message)s"
        datefmt: '%Y-%m-%d  %H:%M:%S'

handlers:
    by_pid_file_handler:
        class: logger.RotatingFileHandlerByPID
        level: DEBUG
        formatter: simple
        filename: /data/ebox/wavegate/log/system.log
        maxBytes: 10485760 # 10MB
        backupCount: 5
        encoding: utf8
    time_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: simple
        filename: /data/ebox/wavegate/log/system.log
        maxBytes: 10485760 # 10MB
        backupCount: 10
        encoding: utf8
    dynamic_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: simple
        filename: /data/ebox/wavegate/log/dynamic.log
        maxBytes: 10485760 # 10MB
        backupCount: 5
        encoding: utf8
    cross_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: simple
        filename: /data/ebox/wavegate/log/crossing.log
        maxBytes: 10485760 # 10MB
        backupCount: 5
        encoding: utf8
loggers:
    main:
        level: DEBUG
        handlers: [time_handler]
        propagate: no

    dynamic:
        level: INFO
        handlers: [ dynamic_handler ]
        propagate: no

    cross:
        level: INFO
        handlers: [ cross_handler ]
        propagate: no
    
root:
    level: INFO
    handlers: [time_handler]
